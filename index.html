<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة معايدة العيد · Aesthetic Labs</title>
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
</head>
<body>

  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
    <span class="blob blob-4"></span>
  </div>

  <header class="site-header">
    <a href="#" class="brand">
      <img src="assets/logo/logo-one.svg" alt="One" />
    </a>
    <div class="header-tag">بطاقة معايدة العيد</div>
  </header>

  <main class="layout">

    <section class="stage-wrap" aria-label="معاينة البطاقة">
      <div class="stage" id="stage">
        <div class="card-frame" id="cardFrame">
          <img class="card-image" id="cardImage" src="assets/designs/design1.svg" alt="تصميم البطاقة" />
          <div class="name-overlay" id="nameOverlay"><span id="nameText">اكتب اسمك</span></div>
        </div>
      </div>
    </section>

    <aside class="sidebar">
      <div class="panel">
        <div class="panel-head">
          <h1 class="panel-title">صمّم بطاقتك</h1>
          <p class="panel-sub">اكتب اسمك واختر التصميم المناسب لك</p>
        </div>

        <div class="field">
          <label for="nameInput" class="field-label">اسمك</label>
          <input
            id="nameInput"
            type="text"
            class="field-input"
            placeholder="اكتب اسمك هنا"
            maxlength="30"
            autocomplete="off"
            dir="auto"
          />
        </div>

        <div class="field">
          <span class="field-label">اختر التصميم</span>
          <div class="thumbs" id="thumbs">
            <button type="button" class="thumb active" data-design="0" aria-label="التصميم 1">
              <img src="assets/designs/design1.svg" alt="" />
              <span class="thumb-num">1</span>
            </button>
            <button type="button" class="thumb" data-design="1" aria-label="التصميم 2">
              <img src="assets/designs/design2.svg" alt="" />
              <span class="thumb-num">2</span>
            </button>
            <button type="button" class="thumb" data-design="2" aria-label="التصميم 3">
              <img src="assets/designs/design3.svg" alt="" />
              <span class="thumb-num">3</span>
            </button>
            <button type="button" class="thumb" data-design="3" aria-label="التصميم 4">
              <img src="assets/designs/design4.svg" alt="" />
              <span class="thumb-num">4</span>
            </button>
          </div>
        </div>

        <button type="button" id="downloadBtn" class="btn-primary">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
          <span>تحميل البطاقة</span>
        </button>
      </div>
    </aside>

  </main>

  <footer class="site-footer">
    <span>© Aesthetic Labs</span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
